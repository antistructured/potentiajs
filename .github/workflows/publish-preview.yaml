name: Publish Preview Prep

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DRY-RUN to run preview publish preparation checks"
        required: true
        default: "DRY-RUN"

permissions:
  contents: read

jobs:
  dry-run:
    if: ${{ github.event.inputs.confirm == 'DRY-RUN' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release check
        run: bun run check:release

      - name: Verify npm package contents
        run: npm pack --dry-run --json

      - name: Verify npm publish dry-run
        run: npm publish --dry-run --tag preview

      # Real publish is intentionally not enabled in this workflow.
      # To enable later, create a separate protected environment-gated job after
      # the owner explicitly says to publish and npm trusted publishing or an
      # NPM_TOKEN secret has been configured.
